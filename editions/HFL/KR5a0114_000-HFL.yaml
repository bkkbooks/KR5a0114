front:
  text: 黄帝陰符經解序閏六夫人生天地之間禀形者父母受炁者陰陽載萬物者身也然身與道應於物幽契乎人心者唯陰符而已昔庖犧氏没神農氏出黄帝作書契使倉頡觀鳥獸之形與天地之儀運用萬物之象制爲文字鬼神泣其大道裂於是乎道一變至於事事一變至於機而機之用也上有道德治國之行中有全身保命之術次有霸業安邦之理備而无遺當是時也黄帝始祖道家者流欲廣眞風得元女三百餘言復繫以一百餘字總萬化之機權統群靈之妙用藏微隱妙該天括地其經簡其義深理歸於自得者也竊嘗考諸家註解理各異端義執偏見徒知陰符爲黄帝之法言非元女之所授然觀内傳所載云黄帝得元女授陰符經義能内合天機外契人事則三百言實元女之所授而百言乃黄帝之演釋者也故辭要而旨遠義深而理淵觀其爰有奇器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭然進乎象矣知此則陰符之義盡矣後世不可以加諸昔者孔子之講易而繫其辭則易之道无餘藴誠書不盡言言不盡意復何言哉臣所以輒删諸家舊解創爲新注所顯證用貴无錯焉且黄老設教道貴集虚高言廓論離世異俗不誘塵俗之耳目唯露聖賢之腹心玩志者得其衆妙博物者造其至微制自三皇道敷萬代益聖主之謀資賢臣之用上至秦漢下及隋唐將相名臣高眞逸士箋注者不勝其數矣今陰符之用妙在天機苟造乎心豈云小補蹇昌辰謹序
