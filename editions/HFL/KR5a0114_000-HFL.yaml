body:
  text: 陰符經事蹟昔西王母降於王屋山授帝兵法用戰蚩尤於涿鹿之野以剪滅妖孽除天下害然後治邦國立社稷分土地封諸侯五行定巨盜除王母再遣元女授帝秘訣一十九章陰符三百餘言至於金丹玉篆之文寶符飛空之術入火履水之法无不備焉黄帝乃建迎仙之宫修登眞之要出靈章秘書以廣道教施之則六合之内无不濟也自洞庭跨火龍上昇群臣葬劍履於巴山具史明矣傳示此經使後世體而行之故仁者見之謂之仁智者見之謂之智悟之者大抵在乎序道法術以顯仁藏用覽之者理歸自得者也黄帝陰符經解同知建隆觀事賜紫道士保寧大師臣蹇晨解神仙抱一演道章惜精保炁神則存焉得道不死名曰仙爲是故神仙之道應人如谷神老氏所謂谷神不死是也人之所存者神所遇者化抱一者則萬物負陰而抱陽故謂之道生一設數僅萬億兆而皆自一之起此章欲浩傳該備如水中月无不現矣故標章上觀天之道執天之行盡矣天道運而无所積故萬物生是故物有象而可觀道无形而可得是物既自得矣而知天之所爲默而應化是執天之行爾行也者不住之相是道之循環如樞始得其環中故應無方天也者廣大悉備包總群靈以虚爲守以寂爲宗使人心若太虚觸物合道不凝滯於物而不動也人既虚己以待物則物莫不應焉是物我兩忘乃契妙用也有受道之質則毋意毋必毋固毋我動合神機左右逢其源是聖人无爲无不爲矣夫如是則全之盡之也由此觀之觀者觀其心非目之觀也執者執其心非手所執也无觀无執天道得矣天有五賊見之者昌設物之理是賊功賊巧賊時賊物賊命皆天之所爲非人之所能爲也然大禹賊功公輸賊巧孔聖賊時范蠡賊物老彭賊命故賊者取也是五子善天機而爲内聖外王之道且五賊者譬而言之在天則爲五星在地則爲五嶽在人則爲五臟該而言之總五賊之術内在道曰仙在儒曰元遠取之則外物也近取之則内慾也中主内慾心役外見雖居山林而不内息者名曰坐馳且喪其天眞是不識五賊之藴而生内熱擾其胸中莊子謂焚其天和爾夫人之性好尚不同在彼非此處此非彼各滯偏見不能應於無方故見之者則大全之士動必識機故能役物不爲物役也與道爲主宰不逐物遷則五賊之喻以譬之前境心既見之則在我提挈之内善用之則爲五德不善用之則爲五賊故爲昌也五賊在乎心施行於天彼五賊之用施於天地人間未嘗不在焉止於心而已矣故道在物心在身道不爲物遷心不爲身動則确平其不可拔是有道之人制治於未亂保邦於未危一機動則百神隨天之遠耶何其至耶是念之所至以應於天又奚遠近乎哉此言心之運者如此宇宙在乎手萬化生乎身輕清者天重濁者地宇宙乃上下之至極何宇宙之所在而手能執耶老氏謂執大象天下往手者掌握天地輪次陰陽顧大道推移如運之掌上誠宇宙在乎手也神仙亦曰有人識得造化機手搏日月安鑪裏如扣妙門憑乎匠手此言幽遠文不可顯萬化者物之總名而云生乎身者蓋身者生之質惟人萬物之靈身鍾天地之炁空中四大无不藴焉首圓象天足方象地中和乃身身亦一天地也列子謂天地空中一細物豈不以萬化生乎身耶觀其身則萬化之生可知矣天性人也人心機也富與貴是人之所欲貧與賤是人之所惡人之性也好生而惡死就利而去害皆賦之天也如人求一理悟一法成一事者由習而得之故天資之性未有不求而得心懷遠望修其身而就之鄙之者謂之妄想殊不知妄想乃致道之梯也故天之性人使之爲也人之心機使之爲也人所居靜則心也動則機也况天機一發則可以坐進此道又豈可與剪剪者言哉方其人可知矣立天之道以定人也天道靜而人道動動而與陽同德靜而與陰同波寂然不動感而遂通者聖人以虚受人則能返照也人道易動而難靜能知其靜乃應于天老氏所謂歸根曰靜靜曰復命謂定然後能應則窮理盡性矣故立天道以法人人若知天之默默故能體變化而去塵垢心若明鑑應物无窮與天道同遊於人道又奚遠者耶天發殺機龍蛇起陸人發殺機天地反覆天人合發萬變定機天人之道遠而應近與時偕行者是應天順人如不得時而動終莫能會機契運也且夫域中四大至高者天尚不敢擅發於人恐龍蛇之起陸故龍隱於水蛇藏於澤不藏而交相於陸是彰天之發也人不得天時而動則天地晦冥陰陽錯序變晝爲夜以示人之擅發故天得人而行人得天而動若人識機以時而動者雖鬼神莫敢測其情陰陽莫敢知其奥發號施令必不徒然是謂合發人之運心合道默契天眞則三才定其位五老舉其功如古之八百諸侯同會于孟津之上豈不謂天人合發乎治道者无以因循而舍之考稽古以用之積功行以求之則不失其志且靜而聖動而王者是道合乎人天天且弗違而况於人乎此天人合發之時也性有巧拙可以伏藏巧拙之性在乎人可以屈可以伸見機而作藏器於身待時而動使人見其顯而不見其隱蓋有自得之場而能全身遠害以亡後悔者也道德之人又何加焉故曰國之利器不可以示人則大巧若拙不厭深藏返而用之則爲貴矣九竅之邪在乎三要可以動靜前賢以視聽食息大小爲九竅以設三要戒其動靜不失其眞蓋人之炁散太虚則无形聚身中而應事以爲動靜之宜然一身之主唯心有九竅故謂之心之邪在乎三要故治炁養心之士身要正意要直心要平乃制心之三要非耳目口鼻之九竅爲之三要也動靜於人炁使之然持其志无暴其炁正其心无思其邪故詩三百一言以蔽之是曰思无邪此誠得内養其天眞也火生於木禍發必剋姦生於國時動必潰知之修鍊謂之聖人夫木生火反自剋人生事反自賊故火木之喻在人爲无明乃畜積怒炁不自調制内焚天和而致於殂也若之人識自然爐鼎修之身其德乃眞是人能體天法道使國无姦臣身无偽行而近聖之徒猶迷而失之望聖之人何胡越之遠哉天生天殺道之理也物之儻來曰生物既去矣曰死生者春之萌芽死者秋之零落人之有生一炁而聚之人既有死一炁而散之則物與人來去死生未嘗息焉是道之所理而致於斯萬物興廢人有起滅然天地陰陽必然之理也生死代謝凡聖共知故不昩靈原隨物遷徙則同乎象帝之先又孰擬議乎誰氏之子哉蓋生殺之常猶寢猶覺自古以固存富國安民演法章富國者資身也安民者息慾也天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才既安天地育萬物也或生或殺萬物又盜天地而不生不殺人盜萬物而生而殺人又盜萬物以資養是天地人遞相交取而成三才者輪轉和合也故天地萬物與人而成其變化故曰三盜既宜三才乃安故曰食其時百骸理動其機萬化安食者接炁也機者天時地利也食失其時則百骸病機輕於事則言必危萬化者萬國也主上明萬國安人心和萬縁息蓋養生之道與治世之機彼此一也人知其神而神不知不神而所以神神者妙用无方人不得而知之彼神而自不知其神而神則人與神是有无也人有而无也神无而有也有无无有是人與神而共之總出心之藴也潛天而天潛地而地惟心神其能耶是誠之至則神感人故神无方也在物感物在人感人具一切萬法在在處處目擊而道存是神之所爲矣日月有數大小有定聖功生焉神明出焉日者月之積月者年之積紀期十二月爲一歲是日窮於次月窮於紀定三百六十日爲一終年或大小盡以增减陰陽消息之數故五歲再閏以補周天之闕於是聖功神明以之生以之出故人之生有貴賤賢愚之不等唯得道者能逃甲子之數甲子者天地之總目聖功陶焉神明鑄焉次爲萬物之靈使君臣父子夫婦萬物盡歸於倫序謂一千年而生聖五百年而生賢豈不係神聖之陶鑄乎荀子謂天地生君子君子治天地如論道經邦燮理陰陽者非人能之是聖與功神與明之所爲也其盜機也天下莫能見莫能知君子得之固躬小人得之輕命機者得失之變使天地萬物人理爲之否泰興亡損益可否盛衰皆機之變也故盜機者是奪造化於胸臆拈宇宙在掌中故人不測其由而成其功業者機使之然也上爲衮職中爲臣道下爲家節施之於三才无不濟矣大與天地同表細與毫髪分形不湛不寂不濁不皎所謂磨而不磷涅而不緇乃機之妙也如此世之物有象而可觀人得而見之盜之機无眹兆人莫得而知之故機事不密則害成君子得之固躬者得其機也小人得之輕命者失其機也世之人鄙俚蔽性而不知盗機之用也所以固躬輕命在君子小人而顯之彊兵戰勝演術章兵者固國之本可使彊不可使弱以戰則勝是彊敵者也主有三軍之威不施以安天下立太平之基在兵之彊兵之能遇敵則勝此國之兵也人之兵者則不然老氏以人之兵謂佳兵者不祥之器非君子之器不得已而用之恬淡爲上用兵之機要在勝而不美而美之者是樂殺人者不可得志於天下是人兵之輕敵也輕敵者幾喪吾寶不善戰者而失其眞源大軍之後必有凶年者也黄庭内景云長生至慎房中急如何死却令神泣此道是賊命之術惟黄帝老彭爲善得也身兵臨陣恐帥易動故言以喪禮處之以道言之可制治于未亂保邦於未危戰罷陰魔珠珍滿室故曰金玉滿堂莫之能守體道之者人兵在身可宜知也瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍聾瞽之輩雖偏失耳目之不全而致於无聽之以聲非視之以目惟内聽之於心神專一也故云絶利一源而致十倍若更三思可敵萬倍今人六根具十相足以視聽終莫能全其耳目而弗若聾瞽之用心眞矣師者衆也衆人雖備耳目而皆外失於視聽彼之人不足於耳目而聾瞽乎彼人以内得之於心是忘耳目而視聽乎故至人用心若鑑瑩然而外塵不私容物而無私也心生於物死於物機在目居中虚以治五官者心也惟心者爲萬法之源有生之時不若未生之時何哉有生者因心之所役以致於見利而動觀名而念爲財而競睹色而思皆物之役人心使不得盡其天算而中道至於夭亡由此觀之是人因心而有生死未生則无有此也老氏謂爲腹不爲目使内觀无外視免景動於心也至乎達法成聖悟道成眞捨此心又何達悟乎機在目蓋人之心居内以應物於外也天之无恩而大恩生璇璣斡運大道元虚无一物而加於恩自以恩矣故萬物職職皆從无爲植而恩者化物之功物之有功以成於大道之序天何言哉四時行焉萬物生焉是矣迅雷烈風莫不蠢焉雷風迅烈天地之剛炁使其然也夫風雷者天神之威以震動驚乎妄作使之其令以行乎上亂不敢作于下且夫作德心逸日休作偽心勞日拙使其聞雷霆之聲而偽者未嘗不介臆焉休者坦然而無慮是雷風之動人莫不懼焉發聲之初蠢動含靈皆蘇變化矣至樂性餘至靜則廉性者心之生性餘則至樂靜者性之本至靜則行廉放之而不執者則無著物於動靜以害其生人之所貴在於至亷而不在於至樂故至樂則神清而且靜以爲受道之本故清靜爲天下正道之用矣天之至私用之至公天道遠而至私物可容也人道近而至公物无逃也可容者惟天之所爲不可逃者是公之所理統而言之至私至公在反掌之間乎放之於道則天之可違使之於人惟公不可庇何哉道以善而用之故成其私公以刑而理之故不可避使至公不加於民則人道闕矣至私不容於天則物理闕矣道之以公私之用是善惡之教化也故君得之而盡君道臣得之而盡臣道然後可以移風易俗治道之士得之私可以運于心者是謂曲則全也禽之制在炁二足而羽謂之禽禽者心爲朱雀也人之有炁則喜怒哀樂取捨使之也皆是心之不能善制至乎毗於陽則喜毗於陰則怒嘗試論之炁果可制乎炁者所適善惡之馬也或人曰意馬也是皆炁之用唯其心之運故善炁之士既調伏心可知也是治炁養心之道得矣故喜怒不變其容榮枯不易其操乃主宰已定矣又誰毁誰譽乎不逐其物遷是制情之至也生者死之根死者生之根生死在人如晝夜不息此生者死之本有生必死死者又爲生之本死既去矣必又生焉如是出没溺於六道何有不生生不死死乎死生果有議耶无有哉蓋古聖人棄之於六合之外論而不議今夫不生生者脱此形骸而去得道成眞寂然靈源同於虚空證入無爲出三界外與諸眞列位又何生乎既生必死又不死者率逍遥之性納沆瀣之精吸風飲露辟穀餐霞堅固色身積三千功累八百行功成行滿一旦輕舉飛遊大羅與眞仙會是色身而去又何死死乎死必有生是有無休止老氏謂吾有大患爲吾有身及吾無身吾有何患蓋言不生生而不死死人之道則不然是不出生死之路以致於輪迴恩生於害害生於恩施人曰恩殘人曰害此恩害顛倒任道之人先勞其筋骨枯槁其性以動爲靜用晦而明此去道則一間耳故乆寓寂寞而身登聖人之閫域者是害生恩也恩生於害者言人富貴之際縱其所爲因其所欲而不知修身身既脱去神聖不與提挈散人諸趣可不傷乎故恩害二途不可不察也愚人以天地文理聖我以時物文理哲茅塞之徒倥侗顓蒙聰明不開謂之愚愚人之性不博物不知道不率教以謂天地何物也文理何道也故見之爲聖則罔知于何故我以時物文理哲者是知人則哲又哲智也既知人則己可知矣已可知則博物辯道定是與非是智之使用也機謀籌策靡不在焉圖富貴則富貴圖長生則長生是時物文理皆在我之彀中屬我指撝之内道之能乎哉奪其時物文理以爲哲是道德之全矣黄帝陰符演章此之演章黄帝之所述也然陰符辭約而㫖遠義深而理淵續其㫖歸演釋經意使後世之學者觀其辭則其經㫖思過半矣哲人以愚虞我以不愚聖人以期其義我以不期其聖士有道而晦迹謂大智若愚故和同天人之際使之无間者也是修混沌氏之術人内藴賢哲之心外肆愚俗之路以遁世爲不材之木使終其天年此哲者之所見也我以不愚是黄帝辭以譏斯人之輩恐没世而无名稱焉故大冶造物爲蒼生而降靈使之爲賢爲哲沛澤利世今放而不仕得非高尚乎老氏所謂功成名遂身退天之道也聖人期其天生聖人繼賢人以輔之如高宗夢得說是高宗耶是傳說耶自天使其然哉我以不期者蓋體自然之道欲心與天數合必無苟進動必合時於是乎賢不睎愚聖不期物我也者是執天之道使陰陽鬼神莫能得而知之沉水入火自取滅亡陰中之陽曰火陽中之陰曰水火則離也水則坎也今玄牝之門是謂天地根亦人倫之紀男女之序慾性不可除止在於有節故水火之喻則鉛汞之合虎龍之媾任用稍荒幾喪吾寳矣自然之道靜故天地萬物生我无爲而民自化我好靜而民自正此自然之道也夫天地者萬物之父母不以生爲生而况於萬物乎萬物者輔道之總名而道體自然之情狀故萬物生焉天地之道浸故陰陽勝天施地生其益无方天道以靜地道以動動靜失常陰陽錯序今至大者天地尚不能盈溢而人豈可以踰矩矣陰陽相推變化順矣天地之二炁曰陰陽推遷於萬物故其變化者是順陰陽之循環也今旦暮之徙剛柔之行死生代謝寒暑迭遷凡物流動人之常情未嘗有一物而出乎陰陽之度數但六極冥冥皆彼其陶鑄矣是故聖人知自然之道不可違因以制之自然之道不與群物偶故聖人知其不可違者因其常數也所以人法地地法天天法道道法自然豈更有違其自然之道也哉至靜之道律曆即不能契道之至靜律曆即不能契是度數也人在五行術内不造其機豈可以超凡入聖也人若達於至道豈可以律曆而測乎自然之道虚心實腹方可語於道之涯約若機械稍在於胸中去道一何遠哉爰有奇器是生萬象奇器者是受生之質言道與之貌天與之形爰有則夙有其靈明也萬象則一身備矣八卦甲子神機鬼藏陰陽相勝之術昭昭然進乎象矣八卦甲子神之機鬼之藏機藏之用唯鬼神而能之故道之爲萬化也无一物而不備无一人而不全八卦甲子天地之機權神鬼之妙用故望之无際處之无中居不有方出而无體乃陰符之盡理矣重言陰陽相勝之術者此賊命之機後世籛鏗容成氏之所得者是矣昭昭則明明也進乎象者是大過卦中九五枯楊生華之義若契會卦炁抽添之象消息之微識鼎器之法保精運炁則能使陰陽相勝老氏所謂古之善爲士者微妙玄通深不可識此言要道也然後進退用其爻動靜合其卦故離得陽以兆形坎得陰以成體是之謂一陰一陽之謂道繼之者善也成之者性也則陰符妙義非高眞上仙之資其孰能與於此玩之者可以心知不可言告故百姓日用而不知者是矣黄帝陰符經解終
